apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: fly-pgsql
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: fly-pgsql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
        args: ["server", "/data", "--address", ":9000"]
        env:
        - name: MINIO_ROOT_USER
          value: minio
        - name: MINIO_ROOT_PASSWORD
          value: password
        ports:
        - containerPort: 9000
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: fly-pgsql
spec:
  selector:
    app: minio
  ports:
  - port: 9000
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: fly-pgsql
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        command: ["/bin/sh", "-c"]
        args:
        - until mc alias set m http://minio:9000 minio password; do sleep 1; done;
          mc mb --ignore-existing m/neon --region eu-north-1
