apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: statedb-data
  namespace: firth-pgsql
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statedb
  namespace: firth-pgsql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statedb
  template:
    metadata:
      labels:
        app: statedb
    spec:
      containers:
      - name: postgres
        image: postgres:17
        env:
        - name: POSTGRES_USER
          value: firthpgsql
        - name: POSTGRES_PASSWORD
          value: firthpgsql
        - name: POSTGRES_DB
          value: firthpgsql
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: statedb-data
---
apiVersion: v1
kind: Service
metadata:
  name: statedb
  namespace: firth-pgsql
spec:
  selector:
    app: statedb
  ports:
  - port: 5432
